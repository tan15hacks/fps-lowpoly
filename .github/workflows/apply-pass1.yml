name: Apply Pass 1 lifecycle stabilization

on:
  push:
    branches:
      - agent/pass-1-lifecycle-stabilization
    paths:
      - .github/pass1_apply.py
      - .github/workflows/apply-pass1.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Pass 1 branch
        uses: actions/checkout@v4
        with:
          ref: agent/pass-1-lifecycle-stabilization

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply lifecycle patch
        run: python .github/pass1_apply.py

      - name: Generate reproducible lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Install locked dependencies
        run: npm ci

      - name: Validate stabilized build
        run: |
          npm run typecheck
          npm run lint
          npm run test
          npm run build

      - name: Commit verified Pass 1 changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/pass1_apply.py .github/workflows/apply-pass1.yml
          git add -A
          git commit -m "fix: stabilize run lifecycle and cleanup"
          git push origin HEAD:agent/pass-1-lifecycle-stabilization
