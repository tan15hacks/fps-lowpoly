name: Apply Pass 3 combat integration

on:
  push:
    branches:
      - agent/pass-3-weapons-combat

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out Pass 3 branch
        uses: actions/checkout@v4
        with:
          ref: agent/pass-3-weapons-combat

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply combat integration patch
        run: python .github/pass3_apply.py

      - name: Install locked dependencies
        run: npm ci

      - name: Validate Pass 3
        run: |
          npm run typecheck
          npm run lint
          npm run test
          npm run build

      - name: Commit verified Pass 3 integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/pass3_apply.py .github/workflows/apply-pass3.yml
          git add -A
          git commit -m "fix: integrate Pass 3 combat state"
          git push origin HEAD:agent/pass-3-weapons-combat
