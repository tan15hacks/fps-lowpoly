name: Expand Polygon Outpost source

on:
  push:
    branches:
      - agent/polygon-outpost-v1
    paths:
      - .publish/finalize

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: agent/polygon-outpost-v1

      - name: Reconstruct editable source
        shell: bash
        run: |
          set -euo pipefail
          cat .publish/chunk-*.b64 | base64 --decode > /tmp/polygon-outpost.tar.gz
          tar -xzf /tmp/polygon-outpost.tar.gz -C .
          rm -rf .publish
          rm -f .github/workflows/expand-project.yml

      - name: Commit expanded project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build: complete Polygon Outpost v1"
          git push origin HEAD:agent/polygon-outpost-v1
