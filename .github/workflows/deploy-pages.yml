name: Deploy Polygon Outpost to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: |
          npm run typecheck
          npm run lint
          npm run test

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build web game
        env:
          VITE_BASE_PATH: /fps-lowpoly/
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Publish deployment status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          SITE_URL: https://tan15hacks.github.io/fps-lowpoly/
        shell: bash
        run: |
          set -euo pipefail
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [[ "${BUILD_RESULT}" == "success" && "${DEPLOY_RESULT}" == "success" ]]; then
            STATE="success"
            DESCRIPTION="Polygon Outpost deployed to GitHub Pages"
            TARGET_URL="${SITE_URL}"
          else
            STATE="failure"
            DESCRIPTION="Pages failed: build=${BUILD_RESULT}, deploy=${DEPLOY_RESULT}"
            TARGET_URL="${RUN_URL}"
          fi
          PAYLOAD=$(jq -n \
            --arg state "${STATE}" \
            --arg target_url "${TARGET_URL}" \
            --arg description "${DESCRIPTION}" \
            --arg context "github-pages/deploy" \
            '{state:$state,target_url:$target_url,description:$description,context:$context}')
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data "${PAYLOAD}"
